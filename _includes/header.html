<!-- ==== BEGIN header ==== -->
<header class="masthead" role="banner">

    <div class="open sep"></div>

	<!-- ==== Logo ==== -->
	<div id="logo">
	    <p>Mageluer Swimming Pool</p>
	</div>

	<!-- ==== Menu ==== -->
	<nav role="navigation">
	    <ol id="menu">
		<li class="menu-item"><a href="{{ "/" | prepend: site.baseurl }}">Home</a></li>
		<li class="menu-item"><a href="{{ "/blog" | prepend: site.baseurl }}">Blog</a></li>
		<li class="menu-item"><a href="http://music.163.com/#/user/home?id=74939826">Music</a></li>
		<li class="menu-item"><a href="{{ "/about" | prepend: site.baseurl }}">About Me</a></li>
		<li class="menu-item"><a href="{{ "/contact" | prepend: site.baseurl }}">Contact Me</a></li>
	</nav>

	<!-- ==== Menu-list-mobile ==== -->
	<select id="menu-list-mobile" onchange="menu_click(this)">
	    <option value="#">NAVIGATE...</option>
	    <option value="{{ "/" | prepend: site.baseurl }}">Home</option>
	    <option value="{{ "/blog" | prepend: site.baseurl }}">Blog</option>
	    <option value="http://music.163.com/#/user/home?id=74939826">Music</option>
	    <option value="{{ "/about" | prepend: site.baseurl }}">About</option>
	    <option value="{{ "/contact" | prepend: site.baseurl }}">Contact</option>
        </select>

	<div class="light sep"><div>
																					
	<!-- ==== Need Script for mobile menu ==== -->
	<script>
	    function menu_click(obj){
                var num=0;
		for(var i = 1; i < obj.options.length; i++){
		    if(obj.options[i].selected == true){
		        num++;
		    }
		}
		if(num == 1){
		    var url = obj.options[obj.selectedIndex].value;
		    window.location.href=url;
		}
            }
	</script>



</header>
<!-- END header -->
